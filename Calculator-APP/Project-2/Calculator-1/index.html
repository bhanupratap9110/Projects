<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
</head>
<body>
    <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="buttons">

        <button class="btn-calc" onclick="appendValue('1')">1</button>
        <button class="btn-calc" onclick="appendValue('2')">2</button>
        <button class="btn-calc" onclick="appendValue('3')">3</button>
        <button class="btn-calc" onclick="appendValue('4')">4</button>
        <button class="btn-calc" onclick="appendValue('5')">5</button>
        <button class="btn-calc" onclick="appendValue('6')">6</button>
        <button class="btn-calc" onclick="appendValue('7')">7</button>
        <button class="btn-calc" onclick="appendValue('8')">8</button>
        <button class="btn-calc" onclick="appendValue('9')">9</button>
        <button class="btn-calc" onclick="appendValue('0')">0</button>
    
        <button class="btn-calc btn-operator" onclick="appendValue('+')">+</button>
        <button class="btn-calc btn-operator" onclick="appendValue('-')">-</button>
        <button class="btn-calc btn-operator" onclick="appendValue('*')">*</button>
        <button class="btn-calc btn-operator" onclick="appendValue('/')">/</button>
        <button class="btn-calc btn-operator" onclick="appendValue('.')">.</button>

        <button class="btn-calc btn-equal" onclick="calculate()">=</button>
        <button id="backBtn" class="btn-calc" onclick="clearOne()">C</button>
    </div>

</div>

    <!-- JS -->
    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
</body>
</html>
